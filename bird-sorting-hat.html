<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>你是什么鸟 · 观鸟人格坐标</title>
<style>
  :root{
    --mist:#E9EEEA;
    --paper:#F8FAF7;
    --ink:#1F302C;
    --ink-soft:#5A6C66;
    --reed:#3E6B5E;
    --reed-deep:#2C4F45;
    --sage:#9DB2AA;
    --buff:#D98A3D;
    --buff-soft:#EBC79A;
    --line:#D5DED8;
    --shadow:0 1px 2px rgba(31,48,44,.06), 0 8px 30px rgba(31,48,44,.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #F2F6F1 0%, var(--mist) 55%) fixed;
    color:var(--ink);
    font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.7;
    min-height:100vh;
  }
  .stage{
    max-width:560px;
    margin:0 auto;
    padding:34px 22px calc(48px + env(safe-area-inset-bottom));
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  .serif{font-family:"Songti SC","STSong","Source Han Serif SC",serif;}
  .latin{font-family:Georgia,"Times New Roman",serif;font-style:italic;}

  /* ---------- shared ---------- */
  .screen{display:none;animation:rise .5s ease both;}
  .screen.on{display:flex;flex-direction:column;flex:1;}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

  .eyebrow{
    font-size:12px;letter-spacing:.22em;color:var(--reed);
    text-transform:uppercase;margin:0 0 18px;font-weight:600;
  }
  .btn{
    display:inline-flex;align-items:center;gap:10px;justify-content:center;
    border:none;cursor:pointer;font:inherit;
    background:var(--reed-deep);color:#F4F8F5;
    padding:15px 26px;border-radius:999px;font-size:15px;font-weight:600;
    letter-spacing:.02em;box-shadow:var(--shadow);
    transition:transform .15s ease, background .2s ease;
  }
  .btn:hover{background:var(--reed);transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn-ghost{
    background:none;color:var(--ink-soft);box-shadow:none;border:none;
    padding:8px 4px;font-size:14px;cursor:pointer;font:inherit;font-weight:500;
  }
  .btn-ghost:hover{color:var(--reed);}

  /* ---------- intro ---------- */
  #intro{justify-content:center;text-align:left;}
  .title{
    font-size:clamp(48px,16vw,76px);line-height:.96;font-weight:800;
    letter-spacing:.02em;margin:0 0 4px;color:var(--ink);
  }
  .title .b{color:var(--buff);}
  .lead{font-size:16px;color:var(--ink-soft);margin:22px 0 8px;max-width:30em;}
  .lead .pop{color:var(--ink);font-weight:600;}
  .intro-actions{margin-top:30px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .fine{font-size:12.5px;color:var(--sage);margin-top:26px;}

  /* ---------- quiz ---------- */
  #quiz{justify-content:flex-start;}
  .qhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .qcount{font-size:12.5px;letter-spacing:.16em;color:var(--ink-soft);font-weight:600;}
  .qcount b{color:var(--reed);}
  .bar{height:3px;background:var(--line);border-radius:2px;overflow:hidden;margin:14px 0 30px;}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--reed),var(--buff));
    border-radius:2px;transition:width .45s cubic-bezier(.4,0,.2,1);}
  .qtext{
    font-size:clamp(21px,5.4vw,25px);line-height:1.45;font-weight:700;
    margin:0 0 26px;letter-spacing:.01em;
  }
  .opts{display:flex;flex-direction:column;gap:13px;}
  .opt{
    text-align:left;cursor:pointer;font:inherit;color:var(--ink);
    background:var(--paper);border:1px solid var(--line);border-radius:15px;
    padding:16px 18px;font-size:15.5px;line-height:1.5;
    box-shadow:0 1px 2px rgba(31,48,44,.04);
    transition:border-color .18s ease, transform .12s ease, background .18s ease;
    display:flex;align-items:flex-start;gap:13px;
  }
  .opt:hover{border-color:var(--sage);transform:translateX(2px);}
  .opt .dot{
    flex:none;width:18px;height:18px;border-radius:50%;margin-top:2px;
    border:1.5px solid var(--sage);transition:all .18s ease;
  }
  .opt.sel{border-color:var(--reed);background:#EFF4F0;}
  .opt.sel .dot{border-color:var(--reed);background:var(--reed);box-shadow:inset 0 0 0 3px var(--paper);}
  .qfoot{margin-top:26px;}

  /* ---------- result ---------- */
  #result{justify-content:flex-start;}
  .seal{
    width:172px;height:172px;margin:2px auto 16px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:var(--paper);border:1px solid var(--line);
    box-shadow:var(--shadow);position:relative;
  }
  .seal::after{
    content:"";position:absolute;inset:9px;border-radius:50%;
    border:1px dashed var(--buff-soft);
  }
  .seal svg{width:74px;height:74px;color:var(--reed-deep);position:relative;z-index:1;}
  .seal img{width:84%;height:84%;object-fit:contain;display:block;position:relative;z-index:1;}
  .r-axis{text-align:center;font-size:12.5px;letter-spacing:.18em;color:var(--buff);font-weight:700;text-transform:uppercase;margin:0 0 6px;}
  .r-name{text-align:center;font-size:clamp(34px,10vw,46px);font-weight:800;letter-spacing:.04em;margin:0;color:var(--ink);}
  .r-latin{text-align:center;font-size:15px;color:var(--ink-soft);margin:4px 0 22px;}
  .r-desc{
    background:var(--paper);border:1px solid var(--line);border-radius:16px;
    padding:20px 20px;font-size:15.5px;line-height:1.78;color:var(--ink);
    box-shadow:var(--shadow);
  }
  .r-desc .echo{display:block;margin-top:12px;color:var(--ink-soft);font-size:14px;}

  .chips{display:flex;gap:10px;justify-content:center;margin:22px 0 4px;flex-wrap:wrap;}
  .chip{
    font-size:13px;font-weight:600;color:var(--reed-deep);
    background:#EAF1ED;border:1px solid #D2E1DA;border-radius:999px;
    padding:7px 15px;letter-spacing:.02em;
  }
  .chip b{color:var(--buff);}

  /* plane */
  .plane-wrap{margin:26px 0 6px;}
  .plane-cap{text-align:center;font-size:12.5px;letter-spacing:.14em;color:var(--ink-soft);margin:0 0 12px;font-weight:600;}
  .plane{width:100%;max-width:340px;margin:0 auto;display:block;}
  .undertow{
    text-align:center;font-size:14.5px;color:var(--ink-soft);
    margin:20px auto 0;max-width:26em;line-height:1.7;
  }
  .undertow b{color:var(--reed-deep);}
  .r-actions{display:flex;flex-direction:column;align-items:center;gap:12px;margin:30px 0 8px;}
  .hint{font-size:12.5px;color:var(--sage);text-align:center;}
  .foot{
    margin-top:30px;padding-top:18px;border-top:1px solid var(--line);
    font-size:12.5px;color:var(--sage);text-align:center;line-height:1.7;
  }

  @media (prefers-reduced-motion: reduce){
    .screen{animation:none;}
    .bar > i{transition:none;}
    *{scroll-behavior:auto;}
  }
</style>
</head>
<body>
<div class="stage">

  <!-- ============ INTRO ============ -->
  <section id="intro" class="screen on">
    <p class="eyebrow">观鸟人格坐标 · 鸟界的 MBTI</p>
    <h1 class="title serif">你是<br>什么<span class="b">鸟</span></h1>
    <p class="lead">这是一句问候,不是一句脏话。</p>
    <p class="lead">同样举着望远镜站在野外:有人为了一只没见过的鸟能开三百公里,有人能在同一片水边<span class="pop">站一上午</span>。十二个问题,把你放进观鸟人的坐标里——你不会被塞进某个格子,而是落在平面上的<span class="pop">一个点</span>。</p>
    <div class="intro-actions">
      <button class="btn" id="start">戴上望远镜 →</button>
    </div>
    <p class="fine">没有标准答案,也没有高下之分。帽子只认你怎么看,不认你看得对不对。</p>
  </section>

  <!-- ============ QUIZ ============ -->
  <section id="quiz" class="screen">
    <div class="qhead">
      <span class="qcount">第 <b id="qnow">1</b> 题 / 共 <span id="qall">12</span></span>
      <button class="btn-ghost" id="back">← 上一题</button>
    </div>
    <div class="bar"><i id="barfill"></i></div>
    <h2 class="qtext" id="qtext"></h2>
    <div class="opts" id="opts"></div>
    <div class="qfoot"></div>
  </section>

  <!-- ============ RESULT ============ -->
  <section id="result" class="screen">
    <div class="seal" id="seal"></div>
    <p class="r-axis" id="rAxis"></p>
    <h2 class="r-name serif" id="rName"></h2>
    <p class="r-latin latin" id="rLatin"></p>
    <div class="chips" id="rChips"></div>
    <div class="r-desc" id="rDesc"></div>

    <div class="plane-wrap">
      <p class="plane-cap">你在观鸟人坐标上的位置</p>
      <svg class="plane" id="plane" viewBox="0 0 340 340" role="img" aria-label="观鸟人格坐标平面"></svg>
    </div>

    <p class="undertow" id="rUnder"></p>

    <div class="r-actions">
      <button class="btn" id="again">换个心情,再测一次</button>
      <p class="hint">截图保存,发给那个总拉你出门的鸟友。</p>
    </div>

    <p class="foot">观鸟人格坐标 · 自知之鸣<br>四个象限都框不住你的时候,会飞来第五只鸟。</p>
  </section>

</div>

    ]},

  if(kind==="albatross") return `<svg viewBox="0 0 100 100">
    <path ${c} d="M50 46 C32 38 16 44 6 40 C20 48 36 52 50 52 C64 52 80 48 94 40 C84 44 68 38 50 46 Z"/>
    <circle cx="50" cy="45" r="4" ${c}/>
    <path ${c} d="M50 43 L60 40 L50 47 Z"/>
  </svg>`;
  if(kind==="flock"){
    const bird=(x,y,s)=>`<path ${st} transform="translate(${x} ${y}) scale(${s})" d="M-9 0 Q-4 -7 0 -2 Q4 -7 9 0"/>`;
    return `<svg viewBox="0 0 100 100">
      ${bird(34,38,1.1)} ${bird(64,46,1.3)} ${bird(44,64,1.0)} ${bird(72,72,0.85)} ${bird(22,66,0.8)}
    </svg>`;
  }
  return "";
}

/* ---------------- engine ---------------- */
const $ = s => document.querySelector(s);
let idx = 0;
let answers = new Array(QUESTIONS.length).fill(null);
const MAXX = QUESTIONS.reduce((s,q)=> s + Math.max(...q.o.map(o=>Math.abs(o.dx))), 0);
const MAXY = QUESTIONS.reduce((s,q)=> s + Math.max(...q.o.map(o=>Math.abs(o.dy))), 0);

$("#qall").textContent = QUESTIONS.length;

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));
  $(id).classList.add("on");
  window.scrollTo({top:0, behavior:"instant" in window ? "instant" : "auto"});
}

function renderQ(){
  const q = QUESTIONS[idx];
  $("#qnow").textContent = idx+1;
  $("#barfill").style.width = ((idx)/QUESTIONS.length*100) + "%";
  $("#back").style.visibility = idx===0 ? "hidden" : "visible";
  $("#qtext").textContent = q.q;
  const wrap = $("#opts");
  wrap.innerHTML = "";
  q.o.forEach((o,i)=>{
    const b = document.createElement("button");
    b.className = "opt" + (answers[idx]===i ? " sel" : "");
    b.innerHTML = `<span class="dot"></span><span>${o.t}</span>`;
    b.onclick = ()=>{
      answers[idx] = i;
      [...wrap.children].forEach(c=>c.classList.remove("sel"));
      b.classList.add("sel");
      $("#barfill").style.width = ((idx+1)/QUESTIONS.length*100) + "%";
      setTimeout(next, 240);
    };
    wrap.appendChild(b);
  });
}

function next(){
  if(idx < QUESTIONS.length-1){ idx++; renderQ(); }
  else finish();
}
function prev(){ if(idx>0){ idx--; renderQ(); } }

function finish(){
  let X=0, Y=0;
  answers.forEach((a,i)=>{ const o = QUESTIONS[i].o[a]; X+=o.dx; Y+=o.dy; });
  const nx = X/MAXX, ny = Y/MAXY;            // -1..1
  const radius = Math.hypot(nx,ny);

  // distance to each corner -> ranked
  const ranked = CORNERS.map(c=>({key:c.key, d:Math.hypot(nx-c.cx, ny-c.cy)}))
                        .sort((a,b)=>a.d-b.d);

  const isCenter = radius < 0.16;
  const primaryKey = isCenter ? "albatross" : ranked[0].key;
  const underKey = ranked[ isCenter ? 0 : 1 ].key;

  renderResult(primaryKey, underKey, nx, ny, isCenter);
  show("#result");
}

function renderResult(key, underKey, nx, ny, isCenter){
  const b = BIRDS[key];
  $("#seal").innerHTML = IMG[key] ? '<img src="'+IMG[key]+'" alt="'+b.name+'插图">' : svgFor(b.silhouette);
  $("#rAxis").textContent = b.axis;
  $("#rName").textContent = b.name;
  $("#rLatin").textContent = b.latin;

  const chips = $("#rChips"); chips.innerHTML="";
  b.chips.forEach(t=>{ const e=document.createElement("span"); e.className="chip"; e.textContent=t; chips.appendChild(e); });

  $("#rDesc").innerHTML = b.desc + (b.echo ? `<span class="echo">${b.echo}</span>` : "");

  // axis read-out
  const chaser = Math.round((1-nx)/2*100);    // 0..100, 越大越追逐
  const flock  = Math.round((ny+1)/2*100);    // 0..100, 越大越结群
  const xLabel = chaser>=50 ? `追逐 <b>${chaser}%</b>` : `守望 <b>${100-chaser}%</b>`;
  const yLabel = flock>=50  ? `结群 <b>${flock}%</b>`  : `独行 <b>${100-flock}%</b>`;
  const ax = document.createElement("span"); ax.className="chip"; ax.innerHTML=xLabel;
  const ay = document.createElement("span"); ay.className="chip"; ay.innerHTML=yLabel;
  chips.appendChild(ax); chips.appendChild(ay);

  drawPlane(nx, ny, key, isCenter);

  const u = BIRDS[underKey];
  $("#rUnder").innerHTML = isCenter
    ? `你飘在正中央。要说最靠近的一片海岸,那是 <b>${u.name}</b> 的方向。`
    : `你的底色里,还栖着一只 <b>${u.name}</b>。`;
}

/* ---------------- plane drawing ---------------- */
function drawPlane(nx, ny, key, isCenter){
  const S=340, pad=46, mid=S/2, span=(S-2*pad)/2;
  const px = mid + nx*span;
  const py = mid - ny*span;          // flip: +y is up (结群)
  const ink="#1F302C", soft="#5A6C66", line="#D5DED8", reed="#3E6B5E", buff="#D98A3D";

  // quadrant labels at fixed inset corners
  const ql = [
    {name:"紫翅椋鸟", x:pad+8,    y:pad+20,  anchor:"start"},
    {name:"游隼",     x:pad+8,    y:S-pad-12,anchor:"start"},
    {name:"红耳鹎",   x:S-pad-8,  y:pad+20,  anchor:"end"},
    {name:"苍鹭",     x:S-pad-8,  y:S-pad-12,anchor:"end"},
  ];

  let g = `
    <rect x="${pad}" y="${pad}" width="${S-2*pad}" height="${S-2*pad}" rx="14"
          fill="#F8FAF7" stroke="${line}"/>
    <line x1="${mid}" y1="${pad}" x2="${mid}" y2="${S-pad}" stroke="${line}" stroke-dasharray="3 5"/>
    <line x1="${pad}" y1="${mid}" x2="${S-pad}" y2="${mid}" stroke="${line}" stroke-dasharray="3 5"/>
    <!-- axis labels -->
    <text x="${mid}" y="${pad-16}" text-anchor="middle" fill="${soft}" font-size="13" font-weight="600" letter-spacing="2">结群</text>
    <text x="${mid}" y="${S-pad+28}" text-anchor="middle" fill="${soft}" font-size="13" font-weight="600" letter-spacing="2">独行</text>
    <text x="${pad-16}" y="${mid}" text-anchor="middle" fill="${soft}" font-size="13" font-weight="600" letter-spacing="2" transform="rotate(-90 ${pad-16} ${mid})">追逐</text>
    <text x="${S-pad+18}" y="${mid}" text-anchor="middle" fill="${soft}" font-size="13" font-weight="600" letter-spacing="2" transform="rotate(90 ${S-pad+18} ${mid})">守望</text>
  `;
  // quadrant bird names (faint)
  ql.forEach(q=>{
    g += `<text x="${q.x}" y="${q.y}" text-anchor="${q.anchor}" fill="${'#A9BBB3'}" font-size="12.5" font-family="'Songti SC','STSong',serif">${q.name}</text>`;
  });
  // user point
  g += `
    <line x1="${mid}" y1="${mid}" x2="${px}" y2="${py}" stroke="${buff}" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.7"/>
    <circle cx="${px}" cy="${py}" r="13" fill="${buff}" opacity="0.16">
      <animate attributeName="r" values="11;18;11" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.18;0.05;0.18" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="${px}" cy="${py}" r="6.5" fill="${reed}" stroke="#F8FAF7" stroke-width="2.5"/>
    <text x="${px}" y="${py-16}" text-anchor="middle" fill="${ink}" font-size="12.5" font-weight="700">你</text>
  `;
  $("#plane").innerHTML = g;
}

/* ---------------- wiring ---------------- */
$("#start").onclick = ()=>{ idx=0; renderQ(); show("#quiz"); };
$("#back").onclick = prev;
$("#again").onclick = ()=>{
  idx=0; answers = new Array(QUESTIONS.length).fill(null);
  show("#intro");
};
</script>
</body>
</html>
